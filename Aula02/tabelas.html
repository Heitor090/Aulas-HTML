<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=[device-width], initial-scale=1.0" />
    <title>Tabelas em Html</title>
  </head>
  <body>
    <table border="1">
      <caption>
        Lista de pessoas
      </caption>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Idade</th>
          <th>Cidade</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Heitor Leão</td>
          <td>16 anos</td>
          <td>São Paulo</td>
        </tr>
      </tbody>
      <tfoot>
        <td colspan="3">Total de pessoas: 1</td>
      </tfoot>
    </table>
  </body>
</html>
